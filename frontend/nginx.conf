server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;
    gzip_proxied any;
    gzip_vary on;

    # -------------------------------------------------------
    # Security headers
    # -------------------------------------------------------
    add_header X-Content-Type-Options "nosniff"  always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------
    # Health check endpoint (for Docker HEALTHCHECK + LB probes)
    # -------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # -------------------------------------------------------
    # Static assets — aggressive caching with content hash
    # -------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|map|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------
    # Proxy /api/* → backend:8000/*
    # Keeps the frontend from needing to know the backend URL.
    # -------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # -------------------------------------------------------
    # SPA fallback — all other routes → index.html
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
